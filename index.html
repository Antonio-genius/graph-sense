<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Sense Training</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="app-header">
        <h1>Number Sense Training</h1>
    </header>
    <div id="controls">
        <label for="difficulty">Difficulty:</label>
        <input type="range" id="difficulty" name="difficulty" min="1" max="10" value="5">
        <label for="rows">Number of Rows:</label>
        <input type="number" id="rows" name="rows" min="2" max="500" value="5">
        <label for="time">Time Limit (s):</label>
        <input type="number" id="time" name="time" min="0.1" max="100" step="0.1" value="10">
        <button id="pause">Pause</button>
        <button id="restart">Restart</button>
        <button id="back">Back</button>
        <button id="stats-btn">Statistics</button>
        <button id="theme-toggle">Light Mode</button>
    </div>
    <!-- Statistics Overlay -->
    <div id="stats-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h2>Statistics</h2>
            <div id="stats-content">
                <div id="stats-list"></div>
                <h3>Practice Mode</h3>
                <div id="practice-options">
                    <button class="practice-btn" data-type="Pie to Table">Pie to Table</button>
                    <button class="practice-btn" data-type="Table to Pie">Table to Pie</button>
                    <button class="practice-btn" data-type="Bar to Table">Bar to Table</button>
                    <button class="practice-btn" data-type="Table to Bar">Table to Bar</button>
                    <button class="practice-btn" data-type="Line to Table">Line to Table</button>
                    <button class="practice-btn" data-type="Table to Line">Table to Line</button>
                </div>
                <button id="exit-practice" class="exit-btn">Exit Practice Mode</button>
            </div>
            <span id="close-stats" class="close-btn">&times;</span>
        </div>
    </div>
    <div id="timer"></div>
    <div id="question"></div>
    <div id="answers">
        <div class="answer-choice"></div>
        <div class="answer-choice"></div>
        <div class="answer-choice"></div>
        <div class="answer-choice"></div>
    </div>
    <div id="feedback"></div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="charts.js"></script>
    <script src="script.js"></script>
</body>
</html>
